name: Build Kazumi Quest APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build arm64 APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        id: flutter-action
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Apply jni build-id workaround
        shell: bash
        run: |
          JNI_CMAKE=$(find "${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}"             -path "*/jni-*/src/CMakeLists.txt" -print -quit)
          if [ -n "$JNI_CMAKE" ]; then
            sed -i -e 's/-Wl,/-Wl,--build-id=none,/' "$JNI_CMAKE"
          fi

      - name: Build Kazumi Quest
        run: |
          flutter build apk             --release             --split-per-abi             --dart-define=KAZUMI_QUEST_EXTERNAL_MODE=true

      - name: Prepare Quest APK
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk             Kazumi_Quest_arm64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kazumi_Quest_APK
          path: Kazumi_Quest_arm64.apk
          if-no-files-found: error
